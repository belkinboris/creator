<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Кабинет — Создатель</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* Та же система, что на главной: бумага, чернила, жёлтый маркер. */
  :root{--bg:#FBF6EA;--box:#FFFDF6;--line:#E9E1CB;--ink:#1B1C20;--muted:#6F6A5C;
    --marker:#FFDE59;--btn:#1B1C20;--ok:#2E7D4F;--pad:22px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font:400 16px/1.55 "IBM Plex Sans",system-ui,sans-serif;min-height:100vh;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:980px;margin:0 auto;padding:30px 22px 80px;
    padding-left:max(var(--pad), env(safe-area-inset-left));
    padding-right:max(var(--pad), env(safe-area-inset-right))}
  a{color:var(--ink)}
  .top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px;margin-bottom:4px}
  h1{font-size:clamp(24px,4.4vw,32px);font-weight:600;letter-spacing:-.015em}
  h1 .hl{background:linear-gradient(transparent 58%, var(--marker) 58%);padding:0 2px}
  .top a{color:var(--muted);text-decoration:none;font-size:14px}
  .top a:hover{color:var(--ink);text-decoration:underline}
  .sub{color:var(--muted);font-size:15px;margin-bottom:24px}

  .grid{display:grid;gap:14px}
  @media(min-width:720px){.grid{grid-template-columns:1fr 1fr}}
  .p{background:var(--box);border:1px solid var(--line);border-radius:8px;
    padding:18px;display:flex;flex-direction:column;gap:10px}
  .p .kind{font:600 11px "IBM Plex Mono",monospace;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted)}
  .p h2{font-size:19px;font-weight:600;letter-spacing:-.01em}
  .stage{font:600 12px "IBM Plex Mono",monospace;letter-spacing:2px;color:var(--muted)}
  .stage b{color:var(--ink);background:linear-gradient(transparent 45%, var(--marker) 45%);padding:0 2px}
  .stage .nm{letter-spacing:0;font-family:"IBM Plex Sans";font-weight:600;color:var(--ink);margin-left:8px}

  .nums{display:flex;gap:22px;margin-top:2px}
  .n .v{font:600 26px/1 "IBM Plex Mono",monospace}
  .n .l{font:500 11px "IBM Plex Mono",monospace;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);margin-top:4px}
  .bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--marker);border-radius:99px}
  .verdict{font:600 13px "IBM Plex Mono",monospace}
  .next{border-left:3px solid var(--marker);padding:2px 0 2px 12px;font-size:14px}
  .next span{display:block;font:600 10px "IBM Plex Mono",monospace;
    text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
  .acts{margin-top:auto;display:flex;gap:8px;flex-wrap:wrap}
  .btn{border:0;background:var(--btn);color:#fff;border-radius:6px;
    padding:9px 14px;font:600 14px "IBM Plex Sans";cursor:pointer}
  .btn:hover{background:#000}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--ink);background:transparent}
  .btn[disabled]{opacity:.55;cursor:wait}

  .new{border:1px solid var(--line);background:transparent;border-radius:8px;padding:18px;
    display:flex;flex-direction:column;justify-content:center;gap:8px;min-height:150px}
  .new h2{font-size:17px;font-weight:600;color:var(--ink)}
  .new p{font-size:14px;color:var(--muted)}
  .wl{margin-top:22px;font-size:14px;color:var(--muted)}
  #gate{max-width:420px;margin:60px auto;background:var(--box);border:1px solid var(--line);
    border-radius:8px;padding:22px}
  #gate h2{font-size:19px;font-weight:600;margin-bottom:4px}
  #gate p{color:var(--muted);font-size:14px}
  input,select{width:100%;padding:11px 12px;margin:10px 0 0;border:1px solid var(--line);
    border-radius:6px;background:#fff;color:var(--ink);font:inherit}
  #gate .btn{margin-top:12px}
  #form{display:none;margin-top:14px;background:var(--box);
    border:1px solid var(--ink);border-radius:8px;padding:18px;max-width:520px}
  #form h3{font-size:16px;font-weight:600;margin-bottom:4px}
  #form .row{display:flex;gap:8px;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <div id="gate">
    <h2>Кабинет</h2>
    <p>Введите ключ владельца.</p>
    <input type="password" id="key" placeholder="Ключ доступа">
    <button class="btn" onclick="enter()">Войти</button>
  </div>

  <div id="desk" style="display:none">
    <div class="top">
      <h1>Мои <span class="hl">проекты</span></h1>
      <a href="/">На главную →</a>
    </div>
    <p class="sub">Каждый проект — где он на пути 0→7, что показывают цифры и что делать дальше.</p>
    <div class="grid" id="grid"></div>

    <div id="form">
      <h3 id="formTitle">Проект</h3>
      <input id="fName" placeholder="Название">
      <select id="fStage"></select>
      <input id="fNote" placeholder="Что происходит сейчас (одной строкой)">
      <input id="fLink" placeholder="Ссылка на проект (можно пусто)">
      <div class="row">
        <button class="btn" id="fSave">Сохранить</button>
        <button class="btn ghost" onclick="closeForm()">Отмена</button>
      </div>
    </div>
    <p class="wl" id="wl"></p>
  </div>
</div>

<script>
let KEY = sessionStorage.getItem("sozdatel_key") || "";
const STAGES = ["Формулировка","Спрос","Активация","Первая ценность","Мост к деньгам","Оплата","Масштаб","Удержание"];
function strip(a){ return [0,1,2,3,4,5,6,7].map(i=> i===a? `<b>[${i}]</b>`:i).join(" "); }
function enter(){
  KEY = document.getElementById("key").value.trim();
  if(KEY){ sessionStorage.setItem("sozdatel_key", KEY); load(); }
}
async function load(){
  const r = await fetch("/api/cabinet", {headers:{"X-Owner-Key": KEY}});
  if(!r.ok){ sessionStorage.removeItem("sozdatel_key"); document.getElementById("gate").style.display="block"; return; }
  const d = await r.json();
  document.getElementById("gate").style.display = "none";
  document.getElementById("desk").style.display = "block";
  const g = document.getElementById("grid"); g.innerHTML = "";

  d.smoke.forEach(s => {
    const el = document.createElement("div"); el.className = "p";
    el.innerHTML = `
      <div class="kind">проверка спроса · Создатель</div>
      <h2>${s.name}</h2>
      <div class="stage">${strip(s.stage)}<span class="nm">${s.stage_name}</span></div>
      <div class="nums">
        <div class="n"><div class="v">${s.views}<span style="font-size:.5em;color:var(--muted)">/${s.target}</span></div><div class="l">визитов</div></div>
        <div class="n"><div class="v">${s.leads}</div><div class="l">заявок</div></div>
        <div class="n"><div class="v">${s.rate}%</div><div class="l">конверсия</div></div>
      </div>
      <div class="bar"><i style="width:${s.progress}%"></i></div>
      <div class="verdict">${s.verdict}</div>
      <div class="next"><span>следующий шаг</span>${s.next_step}</div>
      <div class="acts">
        <button class="btn" onclick="location.href='${s.project_url}'">Открыть проект</button>
        <button class="btn ghost" onclick="window.open('${s.landing_url}','_blank')">Лендинг</button>
        <button class="btn ghost" onclick="del('${s.idea_id}')">Удалить</button>
      </div>`;
    g.appendChild(el);
  });

  d.tracked.forEach(t => {
    const el = document.createElement("div"); el.className = "p";
    el.innerHTML = `
      <div class="kind">внешний проект · ведётся отдельно</div>
      <h2>${t.name}</h2>
      <div class="stage">${strip(t.stage)}<span class="nm">${t.stage_name}</span></div>
      <div class="next"><span>что происходит</span>${t.note || "—"}</div>
      <div class="acts">
        ${t.link? `<button class="btn" onclick="window.open('${t.link}','_blank')">Открыть</button>`:""}
        <button class="btn ghost" onclick='edit(${t.id},${JSON.stringify(t.name||"")},${t.stage},${JSON.stringify(t.note||"")},${JSON.stringify(t.link||"")})'>Изменить</button>
        <button class="btn ghost" onclick="delTracked(${t.id})">Удалить</button>
      </div>`;
    g.appendChild(el);
  });

  const add = document.createElement("div"); add.className = "new";
  add.innerHTML = `<h2>+ Новая идея</h2><p>Проверить спрос за 5 дней: страница → живые люди → вердикт.</p>
    <div class="acts">
      <button class="btn" onclick="location.href='/?new=1'">Проверить идею</button>
      <button class="btn ghost" onclick="addTracked()">Добавить существующий проект</button>
    </div>`;
  g.appendChild(add);

  // Готовые варианты — запуск в один клик (только те, что ещё не запущены)
  const launched = new Set(d.smoke.map(s=>s.idea_id));
  const pr = await fetch("/api/presets", {headers:{"X-Owner-Key": KEY}});
  if(pr.ok){
    const pd = await pr.json();
    pd.presets.filter(o=>!launched.has(o.idea_id)).forEach(o=>{
      const el = document.createElement("div"); el.className = "new";
      el.innerHTML = `<div class="kind">готовый вариант · запуск в один клик</div>
        <h2 style="color:var(--ink)">${o.product_name}</h2><p>${o.sub}</p>`;
      const b = document.createElement("button"); b.className = "btn"; b.style.alignSelf="flex-start";
      b.textContent = `Запустить «${o.product_name}»`;
      b.onclick = async ()=>{
        b.disabled = true; b.textContent = "Запускаю…";
        const r = await fetch("/api/launch", {method:"POST",
          headers:{"Content-Type":"application/json","X-Owner-Key":KEY},
          body: JSON.stringify({idea_text:"preset:"+o.idea_id, offer:o})});
        const data = await r.json();
        if(data.ok) location.href = `/p/${data.idea_id}`;
      };
      el.appendChild(b); g.appendChild(el);
    });
  }

  document.getElementById("wl").textContent = d.waitlist && d.waitlist.count
    ? `Лист ожидания Создателя: ${d.waitlist.count} контактов`
    : "";
}
async function del(id){
  if(!confirm(`Удалить проверку «${id}» вместе с событиями?`)) return;
  await fetch(`/api/projects/${id}`,{method:"DELETE",headers:{"X-Owner-Key":KEY}}); load();
}
async function delTracked(id){
  if(!confirm("Удалить карточку проекта?")) return;
  await fetch(`/api/tracked/${id}`,{method:"DELETE",headers:{"X-Owner-Key":KEY}}); load();
}
let FORM_ID = null;
function openForm(title, data){
  FORM_ID = data.id || null;
  document.getElementById("formTitle").textContent = title;
  const sel = document.getElementById("fStage");
  sel.innerHTML = STAGES.map((s,i)=>`<option value="${i}">${i} · ${s}</option>`).join("");
  sel.value = data.stage ?? 2;
  document.getElementById("fName").value = data.name || "";
  document.getElementById("fNote").value = data.note || "";
  document.getElementById("fLink").value = data.link || "";
  const f = document.getElementById("form");
  f.style.display = "block"; f.scrollIntoView({behavior:"smooth", block:"center"});
}
function closeForm(){ document.getElementById("form").style.display = "none"; FORM_ID = null; }
document.getElementById("fSave").onclick = async ()=>{
  const body = JSON.stringify({
    name: document.getElementById("fName").value.trim(),
    stage: parseInt(document.getElementById("fStage").value),
    status_note: document.getElementById("fNote").value.trim(),
    external_link: document.getElementById("fLink").value.trim(),
  });
  const opts = {headers:{"Content-Type":"application/json","X-Owner-Key":KEY}, body};
  if(FORM_ID) await fetch(`/api/tracked/${FORM_ID}`, {method:"PATCH", ...opts});
  else await fetch("/api/tracked", {method:"POST", ...opts});
  closeForm(); load();
};

async function edit(id,name,stage,note,link){
  openForm("Изменить проект", {id, name, stage, note, link});
}
async function addTracked(){
  openForm("Добавить существующий проект", {stage: 2});
}
if(KEY) load();
</script>
</body>
</html>
