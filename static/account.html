<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Личный кабинет — Создатель</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 rx=%2712%27 fill=%27%23FFDE59%27/%3E%3Ctext x=%2732%27 y=%2744%27 font-family=%27Arial,sans-serif%27 font-size=%2736%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27%231B1C20%27%3EС%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBF6EA;--box:#FFFDF6;--line:#E9E1CB;--ink:#1B1C20;--muted:#6F6A5C;
    --marker:#FFDE59;--btn:#1B1C20;--ok:#2E7D4F;--warn:#A87B00;--pad:22px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font:400 16px/1.55 "IBM Plex Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding-left:22px;padding-right:22px}
  a{color:var(--ink)}
  .hl{background:linear-gradient(transparent 58%, var(--marker) 58%);padding:0 2px}
  header{border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:baseline;justify-content:space-between;padding-top:14px;padding-bottom:14px}
  .logo{font-weight:700;font-size:17px;color:var(--ink);text-decoration:none}

  .head{padding:36px 0 8px}
  h1{font-size:clamp(24px,4vw,30px);font-weight:600;letter-spacing:-.015em}
  .sub{color:var(--muted);font-size:16px;margin-top:10px;max-width:36em}

  .box{border:1px solid var(--line);background:var(--box);border-radius:8px;padding:20px;margin-top:20px}
  .box input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:6px;
    background:#fff;color:var(--ink);font:inherit;margin-bottom:12px}
  .btn{appearance:none;border:0;cursor:pointer;border-radius:6px;display:inline-block;
    background:var(--btn);color:#fff;font:600 15px "IBM Plex Sans";padding:11px 18px}
  .btn:hover{background:#000}
  .btn[disabled]{opacity:.55;cursor:wait}
  .btn-ghost{appearance:none;cursor:pointer;border-radius:6px;display:inline-block;
    background:transparent;border:1px solid var(--line);color:var(--ink);
    font:500 14px "IBM Plex Sans";padding:9px 14px}
  .btn-ghost:hover{border-color:var(--ink)}
  .err{display:none;margin-top:10px;color:#B23A3A;font-size:15px}
  .err.show{display:block}
  .okmsg{display:none;border-left:3px solid var(--ok);padding:2px 0 2px 12px;margin-top:14px;font-size:15px}
  .okmsg.show{display:block}

  .who{color:var(--muted);font-size:14px;margin-bottom:18px}
  .list-title{font-size:13px;font-weight:600;color:var(--muted);margin:26px 0 10px;
    text-transform:uppercase;letter-spacing:.06em}

  /* Карточка проекта -- тот же язык, что в /desk у владельца: этап 0..7,
     прогресс-бар, статы, вердикт. Покупатель видит ту же ценность. */
  .p{border:1px solid var(--line);background:var(--box);border-radius:8px;padding:18px;margin-bottom:12px}
  .p h2{font-size:18px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
  .stage-line{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .stage-txt{font:600 12px "IBM Plex Mono",monospace;color:var(--muted)}
  .stage-bar{display:flex;gap:3px}
  .stage-bar i{flex:1;height:4px;border-radius:99px;background:var(--line);font-style:normal}
  .stage-bar i.done{background:var(--ink)}
  .nums{display:flex;gap:22px;margin-bottom:10px}
  .n .v{font:600 22px/1 "IBM Plex Mono",monospace}
  .n .l{font:500 11px "IBM Plex Mono",monospace;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);margin-top:4px}
  .verdict{font:600 13px "IBM Plex Mono",monospace;margin-bottom:8px}
  .next{border-left:3px solid var(--marker);padding:2px 0 2px 12px;font-size:14px;color:var(--muted);margin-bottom:14px}
  .p .acts{display:flex;gap:8px;flex-wrap:wrap}

  /* Карточка отчёта -- проще (нет этапа 0..7), но тот же контейнер */
  .item{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    border:1px solid var(--line);background:var(--box);border-radius:8px;padding:14px 16px;margin-bottom:8px}
  .item .name{font-size:15px;font-weight:600}
  .item .sub2{color:var(--muted);font-size:13px;margin-top:2px}
  .empty{color:var(--muted);font-size:15px;padding:8px 0}

  footer{border-top:1px solid var(--line);margin-top:36px;padding:22px 0;color:var(--muted);font-size:13px}
  footer a{color:var(--muted)}
  @media (max-width:560px){:root{--pad:20px} .nums{gap:16px}}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="logo" href="/">Созда<span class="hl">тель</span></a>
  </div>
</header>

<main class="wrap">
  <div id="anon" style="display:none">
    <div class="head">
      <h1>Личный <span class="hl">кабинет</span></h1>
      <p class="sub">Найдите свои проекты и отчёты по почте, на которую оформляли заказ. Без пароля — пришлём ссылку для входа.</p>
    </div>
    <div class="box">
      <input id="contact" type="email" placeholder="Ваша почта">
      <button class="btn" id="link-btn" type="button">Прислать ссылку для входа</button>
      <p class="err" id="err" role="alert"></p>
      <p class="okmsg" id="ok"></p>
    </div>
  </div>

  <div id="known" style="display:none">
    <div class="head">
      <h1>Ваши <span class="hl">проекты и отчёты</span></h1>
      <p class="who" id="who"></p>
    </div>

    <div class="list-title">Запущенные проекты</div>
    <div id="projects"></div>

    <div id="orders-block" style="display:none">
      <div class="list-title">Заявки на живой тест</div>
      <div id="orders"></div>
    </div>

    <div class="list-title">Отчёты по идее</div>
    <div id="reports"></div>

    <button class="btn-ghost" id="logout-btn" type="button" style="margin-top:10px">Выйти</button>
  </div>
</main>

<footer>
  <div class="wrap">
    <span>© Создатель</span> · <a href="/oferta">Публичная оферта</a> · <a href="/agreement">Соглашение</a> · <a href="/privacy">Конфиденциальность</a> · <a href="/contacts">Реквизиты</a>
  </div>
</footer>

<script>
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function stageBadge(stageIdx, name){
  const segs = Array.from({length:8}, (_,i)=> `<i class="${i<=stageIdx?'done':''}"></i>`).join('');
  return `<div class="stage-line"><span class="stage-txt">Этап ${stageIdx+1} из 8 — ${escapeHtml(name)}</span><div class="stage-bar">${segs}</div></div>`;
}

(async function(){
  const r = await fetch('/api/account/me');
  const d = await r.json();
  if (!d.contact) {
    document.getElementById('anon').style.display = 'block';
    return;
  }
  document.getElementById('known').style.display = 'block';
  document.getElementById('who').textContent = d.contact;

  const projectsEl = document.getElementById('projects');
  projectsEl.innerHTML = d.projects.length ? d.projects.map(p => `
    <div class="p">
      <h2>${escapeHtml(p.name)}</h2>
      ${stageBadge(p.stage, p.stage_name)}
      <div class="nums">
        <div class="n"><div class="v">${p.views}<span style="font-size:.55em;color:var(--muted)">/${p.target}</span></div><div class="l">визитов</div></div>
        <div class="n"><div class="v">${p.leads}</div><div class="l">заявок</div></div>
        <div class="n"><div class="v">${p.rate}%</div><div class="l">конверсия</div></div>
      </div>
      <div class="verdict">${escapeHtml(p.verdict)}</div>
      <div class="next">${escapeHtml(p.next_step)}</div>
      <div class="acts"><a class="btn-ghost" href="${p.project_url}">Открыть проект →</a></div>
    </div>`).join('') : '<p class="empty">Пока нет запущенных проектов.</p>';

  const STATUS_LABEL = {
    paid: '', new: 'Заявка принята — свяжемся',
    pending_payment: 'Ожидает оплаты', expired: 'Истекло — оформите заново',
  };

  if (d.orders.length) {
    document.getElementById('orders-block').style.display = 'block';
    document.getElementById('orders').innerHTML = d.orders.map(o => `
      <div class="item">
        <div><div class="name">${escapeHtml(o.idea || 'Без названия')}</div>
          <div class="sub2">${escapeHtml(STATUS_LABEL[o.status] || o.status)}</div></div>
        ${o.continue_url ? `<a class="btn-ghost" href="${o.continue_url}">Открыть →</a>` : ''}
      </div>`).join('');
  }

  const reportsEl = document.getElementById('reports');
  reportsEl.innerHTML = d.reports.length ? d.reports.map(rp => `
    <div class="item">
      <div><div class="name">${escapeHtml(rp.idea)}</div>
        <div class="sub2">${rp.tier === 'full' ? 'Полный отчёт' : 'Быстрый разбор'}${STATUS_LABEL[rp.status] ? ' · ' + escapeHtml(STATUS_LABEL[rp.status]) : ''}</div></div>
      <a class="btn-ghost" href="${rp.report_url}">Открыть →</a>
    </div>`).join('') : '<p class="empty">Пока нет отчётов по идее.</p>';

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/account/logout', {method: 'POST'});
    location.reload();
  });
})();

const linkBtn = document.getElementById('link-btn');
const errEl = document.getElementById('err');
const okEl = document.getElementById('ok');
linkBtn.addEventListener('click', async () => {
  errEl.classList.remove('show'); okEl.classList.remove('show');
  const contact = document.getElementById('contact').value.trim();
  linkBtn.disabled = true;
  const label = linkBtn.textContent;
  linkBtn.textContent = 'Отправляем…';
  try {
    const r = await fetch('/api/account/request-link', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({contact})
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || 'Не получилось. Попробуйте ещё раз.');
    okEl.textContent = data.message; okEl.classList.add('show');
  } catch (e) {
    errEl.textContent = e.message; errEl.classList.add('show');
  } finally {
    linkBtn.disabled = false; linkBtn.textContent = label;
  }
});
</script>
</body>
</html>
